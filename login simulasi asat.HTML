<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Simulasi ASAT - SMP PGRI 1 CIBINONG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 50%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            text-align: center;
            margin-bottom: 16px;
        }

        .header-icon span {
            font-size: 48px;
        }

        .simulation-badge {
            background: #fef3c7;
            color: #d97706;
            text-align: center;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            width: auto;
            margin: 0 auto 16px auto;
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .school-name {
            text-align: center;
            color: #334155;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .exam-title {
            text-align: center;
            background: #dbeafe;
            color: #1e40af;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            margin: 16px 0;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .stats {
            background: #eff6ff;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 28px;
            font-size: 13px;
            font-weight: 600;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            background: #f8fafc;
        }

        input:focus {
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #b91c1c;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #166534;
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
        }

        .simulation-note {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            border: 1px solid #fecaca;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }
            h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
